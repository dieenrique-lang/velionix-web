<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dejar una Reseña — Velionix</title>
    <!-- Open Graph -->
    <meta property="og:title" content="Dejar una Reseña — Velionix">
    <meta property="og:description" content="Comparte tu experiencia trabajando con Velionix">
    <meta property="og:image" content="https://velionix.cl/og-image.png">
    <meta property="og:url" content="https://velionix.cl/resena">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/x-icon" href="https://velionix.cl/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#0a0a0f;
            --ink:#e6f0fb;
            --muted:rgba(230,240,251,0.62);
            --cyan:#00e5ff;
            --card:rgba(14,16,28,0.72);
            --line:rgba(255,255,255,0.08);
            --grad:linear-gradient(135deg,#00c8ff,#a855f7);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Space Grotesk',-apple-system,sans-serif;
            background:var(--bg);color:var(--ink);
            line-height:1.6;
            -webkit-font-smoothing:antialiased;
            display:flex;justify-content:center;align-items:center;
            min-height:100vh;padding:24px;
        }
        .bg-ambient{
            position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(circle at 50% 0%, rgba(0,180,255,0.10) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(168,85,247,0.10) 0%, transparent 50%);
        }
        .form-container{
            background:var(--card);border:1px solid var(--line);border-radius:24px;
            padding:40px;width:100%;max-width:540px;position:relative;z-index:10;
            box-shadow:0 30px 80px rgba(0,0,0,0.4);backdrop-filter:blur(10px);
        }
        .logo{display:block;margin:0 auto 32px;height:42px}
        h1{font-size:28px;text-align:center;margin-bottom:8px}
        p.sub{text-align:center;color:var(--muted);font-size:15px;margin-bottom:32px}
        
        .form-group{margin-bottom:20px}
        label{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--muted)}
        input[type="text"], input[type="url"], textarea {
            width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--line);
            border-radius:12px;padding:12px 16px;color:var(--ink);font-family:inherit;font-size:15px;
            transition:border-color .2s;outline:none;
        }
        input[type="text"]:focus, input[type="url"]:focus, textarea:focus{border-color:var(--cyan)}
        textarea{resize:vertical;min-height:100px}
        
        .stars{display:flex;gap:8px;font-size:32px;color:var(--line);cursor:pointer;justify-content:center;margin-bottom:24px;direction:rtl;}
        .stars input{display:none}
        .stars label{color:var(--line);cursor:pointer;transition:color .2s;margin:0;font-size:42px;line-height:1}
        .stars label:hover,
        .stars label:hover ~ label,
        .stars input:checked ~ label {
            color:#facc15;
        }

        .btn{
            width:100%;background:var(--grad);color:#fff;border:none;padding:16px;
            border-radius:50px;font-weight:600;font-size:16px;cursor:pointer;
            transition:transform .2s,box-shadow .2s;font-family:inherit;
        }
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 34px rgba(0,180,255,0.45)}
        
        .success-msg{display:none;text-align:center;padding:40px 0}
        .success-msg h2{color:var(--cyan);margin-bottom:12px}
        
        @media(max-width:480px){
            .form-container{padding:30px 20px}
            h1{font-size:24px}
            .stars label{font-size:36px}
        }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>
    <div class="form-container" id="form-container">
        <img src="https://velionix.cl/logovelionix1.png" alt="Velionix" class="logo">
        <div id="form-content">
            <h1>Déjanos tu opinión</h1>
            <p class="sub">Tu experiencia nos ayuda a mejorar y crecer.</p>
            <form action="https://formspree.io/f/xwvdarko" method="POST" id="review-form">
                <div class="stars">
                    <input type="radio" name="calificacion" id="star5" value="5" required><label for="star5">★</label>
                    <input type="radio" name="calificacion" id="star4" value="4"><label for="star4">★</label>
                    <input type="radio" name="calificacion" id="star3" value="3"><label for="star3">★</label>
                    <input type="radio" name="calificacion" id="star2" value="2"><label for="star2">★</label>
                    <input type="radio" name="calificacion" id="star1" value="1"><label for="star1">★</label>
                </div>
                <div class="form-group">
                    <label>Nombre y Apellido</label>
                    <input type="text" name="nombre" required placeholder="Ej. Camila Rojas">
                </div>
                <div class="form-group">
                    <label>Empresa / Proyecto</label>
                    <input type="text" name="empresa" required placeholder="Ej. Clínica Dental Norte">
                </div>
                <div class="form-group">
                    <label>Cargo / Rubro</label>
                    <input type="text" name="cargo" required placeholder="Ej. Directora">
                </div>
                <div class="form-group">
                    <label>Tu Testimonio</label>
                    <textarea name="testimonio" required placeholder="¿Cómo te ha ayudado Velionix?"></textarea>
                </div>
                <div class="form-group">
                    <label>Sitio Web (Opcional)</label>
                    <input type="url" name="web" placeholder="https://...">
                </div>
                <button type="submit" class="btn">Enviar reseña</button>
            </form>
        </div>
        <div id="success-content" class="success-msg">
            <div style="font-size:64px;margin-bottom:16px">✨</div>
            <h2>¡Gracias por tu tiempo!</h2>
            <p class="sub" style="margin-bottom:0">Hemos recibido tu reseña correctamente.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('review-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            btn.textContent = 'Enviando...';
            btn.disabled = true;
            
            const data = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
                if(response.ok){
                    document.getElementById('form-content').style.display = 'none';
                    document.getElementById('success-content').style.display = 'block';
                } else {
                    throw new Error('Server error');
                }
            } catch(error){
                alert('Hubo un error al enviar tu reseña. Por favor intenta de nuevo.');
                btn.textContent = 'Enviar reseña';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
